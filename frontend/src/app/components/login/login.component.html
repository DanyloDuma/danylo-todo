<main class="auth-page">
  <section class="auth-card" aria-labelledby="login-title">
    <a class="brand" routerLink="/todos">
      <span class="brand-mark" aria-hidden="true"></span>
      Danylo Todo
    </a>
    <p class="eyebrow">Bem-vindo</p>
    <h1 id="login-title">Iniciar sessão</h1>
    <p class="subtitle">Entra para consultares e organizares as tuas tarefas.</p>

    <div class="alert" *ngIf="errorMessage" role="alert">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <div class="form-field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="nome@exemplo.com"
        />
        <small *ngIf="loginForm.controls.email.touched && loginForm.controls.email.hasError('required')">
          O email é obrigatório.
        </small>
        <small *ngIf="loginForm.controls.email.touched && loginForm.controls.email.hasError('email')">
          Introduz um email válido.
        </small>
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="A tua password"
        />
        <small *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid">
          A password é obrigatória.
        </small>
      </div>

      <button class="primary-button" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'A entrar...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-link">
      Ainda não tens conta? <a routerLink="/register">Criar conta</a>
    </p>
  </section>
</main>
