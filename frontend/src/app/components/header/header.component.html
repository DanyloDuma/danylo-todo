<header class="navbar-container">
  <nav class="navbar" aria-label="Navegação principal">
    <a routerLink="/todos" class="navbar-brand" aria-label="Danylo Todo">
      <span class="logo-icon" aria-hidden="true"></span>
      <span class="brand-text">Danylo Todo</span>
    </a>

    <div class="nav-actions">
      <a
        *ngIf="isAuthenticated"
        routerLink="/todos"
        routerLinkActive="active"
        class="nav-link"
      >
        Tarefas
      </a>
      <button
        *ngIf="isAuthenticated"
        type="button"
        class="cta-button"
        [disabled]="isLoggingOut"
        (click)="logout()"
      >
        {{ isLoggingOut ? 'A sair...' : 'Logout' }}
      </button>

      <a *ngIf="!isAuthenticated" routerLink="/login" class="nav-link">Login</a>
      <a *ngIf="!isAuthenticated" routerLink="/register" class="cta-button">Registo</a>
    </div>
  </nav>
</header>
