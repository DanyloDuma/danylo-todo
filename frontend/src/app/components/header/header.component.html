<div class="navbar-container" [ngClass]="{ scrolled: isScrolled }">
  <nav class="navbar">
    <a routerLink="#" class="navbar-brand" (click)="setActive('#home')">
      <div class="logo-icon"></div>
      <span class="brand-text">To-oD</span>
    </a>

    <ul class="navbar-nav">
      <li class="nav-item">
        <a
          routerLink="#"
          class="nav-link"
          [ngClass]="{ active: activeTarget === '#home' }"
          (click)="$event.preventDefault(); setActive('#home')"
          >Home</a
        >
      </li>
      <li class="nav-item">
        <a
          routerLink="#"
          class="nav-link"
          [ngClass]="{ active: activeTarget === '#about' }"
          (click)="$event.preventDefault(); setActive('#about')"
          >Sobre</a
        >
      </li>
      <li class="nav-item">
        <a
          routerLink="#"
          class="nav-link"
          [ngClass]="{ active: activeTarget === '#services' }"
          (click)="$event.preventDefault(); setActive('#services')"
          >Serviços</a
        >
      </li>
      <li>
        <a
          routerLink="#"
          class="cta-button"
          (click)="$event.preventDefault(); setActive('#contact')"
          >Log in</a
        >
      </li>
    </ul>

    <button
      class="mobile-toggle"
      [ngClass]="{ active: isMenuOpen }"
      (click)="toggleMenu($event)"
    >
      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </button>
  </nav>
</div>

<div
  class="mobile-menu-overlay"
  [ngClass]="{ active: isMenuOpen }"
  (click)="closeMenu()"
></div>

<div class="mobile-menu" [ngClass]="{ active: isMenuOpen }">
  <div class="mobile-menu-header">
    <a routerLink="#" class="mobile-menu-brand" (click)="setActive('#home')">
      <span class="brand-text">To-oD</span>
    </a>
    <button class="mobile-menu-close" (click)="closeMenu()">&times;</button>
  </div>

  <ul class="mobile-menu-nav">
    <li class="mobile-menu-item">
      <a
        routerLink="#"
        class="mobile-menu-link"
        [ngClass]="{ active: activeTarget === '#home' }"
        (click)="$event.preventDefault(); setActive('#home')"
        >Home</a
      >
    </li>
    <li class="mobile-menu-item">
      <a
        routerLink="#"
        class="mobile-menu-link"
        [ngClass]="{ active: activeTarget === '#about' }"
        (click)="$event.preventDefault(); setActive('#about')"
        >Sobre</a
      >
    </li>
    <li class="mobile-menu-item">
      <a
        routerLink="#"
        class="mobile-menu-link"
        [ngClass]="{ active: activeTarget === '#services' }"
        (click)="$event.preventDefault(); setActive('#services')"
        >Serviços</a
      >
    </li>
    <div class="mobile-cta">
      <a
        routerLink="#"
        class="mobile-cta-button"
        (click)="$event.preventDefault(); setActive('#contact')"
        >Log-in</a
      >
    </div>
  </ul>
</div>
